version: "3.9"

x-common: &common
  restart: unless-stopped
  networks:
    - ichin-net
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: ichin-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --save 60 1

  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: ichin-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ichin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ichin_secret}
      POSTGRES_DB: ichin_os
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ichin"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  qdrant:
    <<: *common
    image: qdrant/qdrant:v1.12.0
    container_name: ichin-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - qdrant-data:/qdrant/storage

  orchestrator:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.orchestrator
    container_name: ichin-orchestrator
    ports:
      - "8011:8011"
    environment:
      SERVICE_NAME: orchestrator
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ichin:${POSTGRES_PASSWORD:-ichin_secret}@postgres:5432/ichin_os
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  agents:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.agents
    container_name: ichin-agents
    ports:
      - "8012:8012"
    environment:
      SERVICE_NAME: agents
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ichin:${POSTGRES_PASSWORD:-ichin_secret}@postgres:5432/ichin_os
      ORCHESTRATOR_URL: http://orchestrator:8011
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  memory-engine:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.memory
    container_name: ichin-memory
    ports:
      - "8013:8013"
    environment:
      SERVICE_NAME: memory-engine
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ichin:${POSTGRES_PASSWORD:-ichin_secret}@postgres:5432/ichin_os
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  ui-system:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.ui
    container_name: ichin-ui
    ports:
      - "8014:8014"
    environment:
      SERVICE_NAME: ui-system
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  app-runtime:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app-runtime
    container_name: ichin-app-runtime
    ports:
      - "8015:8015"
    environment:
      SERVICE_NAME: app-runtime
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ichin:${POSTGRES_PASSWORD:-ichin_secret}@postgres:5432/ichin_os
      ORCHESTRATOR_URL: http://orchestrator:8011
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  ai-studio:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.ai-studio
    container_name: ichin-ai-studio
    ports:
      - "8016:8016"
    environment:
      SERVICE_NAME: ai-studio
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ichin:${POSTGRES_PASSWORD:-ichin_secret}@postgres:5432/ichin_os
      ORCHESTRATOR_URL: http://orchestrator:8011
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8016/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  security-core:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.security
    container_name: ichin-security
    ports:
      - "8017:8017"
    environment:
      SERVICE_NAME: security-core
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8017/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  ai-router:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.ai-router
    container_name: ichin-ai-router
    ports:
      - "8020:8020"
    environment:
      SERVICE_NAME: ai-router
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  voice-engine:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.voice-engine
    container_name: ichin-voice-engine
    ports:
      - "8030:8030"
    environment:
      SERVICE_NAME: voice-engine
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      MEMORY_URL: http://memory-engine:8013
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      memory-engine:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - voice-data:/app/data

  browser-engine:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.browser-engine
    container_name: ichin-browser-engine
    ports:
      - "8040:8040"
    environment:
      SERVICE_NAME: browser-engine
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      MEMORY_URL: http://memory-engine:8013
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      memory-engine:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - browser-data:/app/data

  ai-metasearch:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.ai-metasearch
    container_name: ichin-ai-metasearch
    ports:
      - "8050:8050"
    environment:
      SERVICE_NAME: ai-metasearch
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
