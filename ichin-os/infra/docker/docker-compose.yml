  mail-ai:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.mail-ai
    container_name: ichin-mail-ai
    ports:
      - "8060:8060"
    environment:
      SERVICE_NAME: mail-ai
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      LOG_LEVEL: ${LOG_LEVEL:-info}
