        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - mail-ai-data:/app/data

  knowledge-graph:
    <<: *common
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.knowledge-graph
    container_name: ichin-knowledge-graph
    ports:
      - "8070:8070"
    environment:
      SERVICE_NAME: knowledge-graph
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_URL: http://orchestrator:8011
      MEMORY_URL: http://memory-engine:8013
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      orchestrator:
        condition: service_healthy
      memory-engine:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - knowledge-graph-data:/app/data

  ichin-kernel:
    <<: *common
    build:
      context: ../kernel
      dockerfile: Dockerfile.build
      target: builder
    container_name: ichin-kernel
    ports:
      - "7000:7000"
    environment:
      SERVICE_NAME: ichin-kernel
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  redis-data:
  postgres-data:
  qdrant-data:
  voice-data:
  browser-data:
  metasearch-data:
  mail-ai-data:
  knowledge-graph-data:

networks:
  ichin-net:
    driver: bridge
