set default="ICHIN OS"
set timeout=5

menuentry "ICHIN OS — AI-First Productivity OS" {
    linux /boot/vmlinuz root=/dev/ram0 rw quiet console=ttyS0,115200 loglevel=3
    initrd /boot/initrd.img
}

menuentry "ICHIN OS — Debug Mode" {
    linux /boot/vmlinuz root=/dev/ram0 rw console=ttyS0,115200 loglevel=7 init=/bin/sh
    initrd /boot/initrd.img
}

menuentry "ICHIN OS — Recovery" {
    linux /boot/vmlinuz root=/dev/ram0 rw single loglevel=7
    initrd /boot/initrd.img
}
