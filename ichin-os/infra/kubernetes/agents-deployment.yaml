apiVersion: apps/v1
kind: Deployment
metadata:
  name: ichin-agents
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-agents
    app.kubernetes.io/component: agents
    app.kubernetes.io/part-of: ichin-os
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ichin-agents
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ichin-agents
        app.kubernetes.io/component: agents
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: agents
          image: ichin/agents:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8012
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ichin-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ichin-db-secret
                  key: password
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ichin-agents
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-agents
    app.kubernetes.io/component: agents
spec:
  type: ClusterIP
  ports:
    - port: 8012
      targetPort: 8012
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ichin-agents
