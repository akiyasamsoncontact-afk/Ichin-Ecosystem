apiVersion: apps/v1
kind: Deployment
metadata:
  name: ichin-ai-studio
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-ai-studio
    app.kubernetes.io/component: ai-studio
    app.kubernetes.io/part-of: ichin-os
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ichin-ai-studio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ichin-ai-studio
        app.kubernetes.io/component: ai-studio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: ai-studio
          image: ichin/ai-studio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8016
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ichin-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ichin-db-secret
                  key: password
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8016
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8016
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ichin-ai-studio
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-ai-studio
    app.kubernetes.io/component: ai-studio
spec:
  type: ClusterIP
  ports:
    - port: 8016
      targetPort: 8016
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ichin-ai-studio
