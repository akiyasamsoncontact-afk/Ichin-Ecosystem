apiVersion: apps/v1
kind: Deployment
metadata:
  name: ichin-desktop-ui
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-desktop-ui
    app.kubernetes.io/component: desktop-ui
    app.kubernetes.io/part-of: ichin-os
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ichin-desktop-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ichin-desktop-ui
        app.kubernetes.io/component: desktop-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: desktop-ui
          image: ichin/desktop-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: API_URL
              value: "http://ichin-orchestrator:8011"
            - name: WS_URL
              value: "ws://ichin-ui-system:8014/ws"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ichin-desktop-ui
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-desktop-ui
    app.kubernetes.io/component: desktop-ui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ichin-desktop-ui
