apiVersion: v1
kind: Namespace
metadata:
  name: ichin-system
  labels:
    name: ichin-system
    app.kubernetes.io/name: ichin-os
    app.kubernetes.io/part-of: ichin-ecosystem
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ichin-quota
  namespace: ichin-system
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ichin-limits
  namespace: ichin-system
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
