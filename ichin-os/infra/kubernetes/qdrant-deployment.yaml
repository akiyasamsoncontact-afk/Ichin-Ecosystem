apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ichin-qdrant
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-qdrant
    app.kubernetes.io/component: vector-db
    app.kubernetes.io/part-of: ichin-os
spec:
  serviceName: ichin-qdrant-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ichin-qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ichin-qdrant
        app.kubernetes.io/component: vector-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.0
          ports:
            - containerPort: 6333
              protocol: TCP
              name: grpc
            - containerPort: 6334
              protocol: TCP
              name: http
          env:
            - name: QDRANT_LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: ichin-qdrant
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-qdrant
    app.kubernetes.io/component: vector-db
spec:
  type: ClusterIP
  ports:
    - port: 6333
      targetPort: 6333
      protocol: TCP
      name: grpc
    - port: 6334
      targetPort: 6334
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ichin-qdrant
---
apiVersion: v1
kind: Service
metadata:
  name: ichin-qdrant-headless
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-qdrant
    app.kubernetes.io/component: vector-db
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6333
      name: grpc
    - port: 6334
      name: http
  selector:
    app.kubernetes.io/name: ichin-qdrant
