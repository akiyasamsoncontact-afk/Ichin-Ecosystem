apiVersion: apps/v1
kind: Deployment
metadata:
  name: ichin-redis
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: ichin-os
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ichin-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ichin-redis
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1"
            - --maxmemory
            - "2gb"
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: ichin-redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ichin-redis-pvc
  namespace: ichin-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: ichin-redis
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: ichin-redis
