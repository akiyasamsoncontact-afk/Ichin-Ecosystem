apiVersion: apps/v1
kind: Deployment
metadata:
  name: ichin-ui-system
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-ui-system
    app.kubernetes.io/component: ui-system
    app.kubernetes.io/part-of: ichin-os
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ichin-ui-system
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ichin-ui-system
        app.kubernetes.io/component: ui-system
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: ui-system
          image: ichin/ui-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8014
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ichin-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8014
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8014
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ichin-ui-system
  namespace: ichin-system
  labels:
    app.kubernetes.io/name: ichin-ui-system
    app.kubernetes.io/component: ui-system
spec:
  type: ClusterIP
  ports:
    - port: 8014
      targetPort: 8014
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ichin-ui-system
